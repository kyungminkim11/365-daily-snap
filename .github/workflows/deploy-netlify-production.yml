name: Inspect failed Netlify deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed deployment log
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 28300908481 --repo "$GITHUB_REPOSITORY" --log-failed > previous-failure.log
      - name: Upload focused failure log
        uses: actions/upload-artifact@v4
        with:
          name: focused-netlify-failure
          path: previous-failure.log
