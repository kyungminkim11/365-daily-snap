name: Inspect GitHub Pages failure

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download Pages failure log
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 28300675930 --repo "$GITHUB_REPOSITORY" --log-failed > pages-failure.log
      - name: Upload focused Pages failure
        uses: actions/upload-artifact@v4
        with:
          name: focused-pages-failure
          path: pages-failure.log
