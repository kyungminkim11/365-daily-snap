name: Inspect GitHub Pages deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: List GitHub Pages workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run list --repo "$GITHUB_REPOSITORY" --workflow deploy-pages.yml --limit 20 --json databaseId,status,conclusion,headSha,event,createdAt,url > pages-runs.json
      - name: Upload Pages run list
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-runs
          path: pages-runs.json
