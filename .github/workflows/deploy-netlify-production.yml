name: Inspect enabled Pages failure

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest Pages failure log
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run view 28301170193 --repo "$GITHUB_REPOSITORY" --log-failed > latest-pages-failure.log
      - name: Upload latest Pages failure
        uses: actions/upload-artifact@v4
        with:
          name: latest-pages-failure
          path: latest-pages-failure.log
