name: Apply Snap email mapping
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[email-map]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update public and admin addresses
        shell: python
        run: |
          from pathlib import Path
          workflow = Path('.github/workflows/apply-email-map.yml')
          admin_names = {'admin-v2.html','admin-portfolio.html','SECURITY_ADMIN_ACCESS.md'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts or path == workflow:
                  continue
              try: old = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError): continue
              if path.name in admin_names:
                  new = old.replace('lavalabs.ceo@gmail.com', 'auth@lavalabs.co.kr').replace('info@lavalabs.co.kr', 'auth@lavalabs.co.kr')
              else:
                  new = old.replace('lavalabs.ceo@gmail.com', 'snap@lavalabs.co.kr').replace('info@lavalabs.co.kr', 'snap@lavalabs.co.kr')
              if new != old: path.write_text(new, encoding='utf-8')
          workflow.unlink()
      - name: Commit changes
        run: |
          git config user.name "Lava Labs Automation"
          git config user.email "dev@lavalabs.co.kr"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update Snap and admin emails [email-map]"
          git push
