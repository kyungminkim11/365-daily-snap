[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  included_files = ["public/portfolio/portfolio.json"]

[dev]
  command = "npm run vite"
  targetPort = 5173
  port = 8888
  publish = "dist"

[[edge_functions]]
  path = "/admin"
  function = "admin-protect"

[[edge_functions]]
  path = "/admin.html"
  function = "admin-protect"

[[edge_functions]]
  path = "/admin-v2.html"
  function = "admin-protect"

[[edge_functions]]
  path = "/manager"
  function = "admin-protect"

[[redirects]]
  from = "/"
  to = "/ko"
  status = 302
  force = false

[[redirects]]
  from = "/admin"
  to = "/admin-v2.html"
  status = 200

[[redirects]]
  from = "/manager"
  to = "/admin-v2.html"
  status = 200

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/inquiries"
  to = "/.netlify/functions/inquiries"
  status = 200

[[redirects]]
  from = "/api/upload-media"
  to = "/.netlify/functions/upload-media"
  status = 200

[[redirects]]
  from = "/api/media/*"
  to = "/.netlify/functions/media?key=:splat"
  status = 200

[[redirects]]
  from = "/ko/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/ja/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/en/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/ko"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/ja"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/en"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/portfolio/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/admin*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store"
