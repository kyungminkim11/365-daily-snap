[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  included_files = ["public/portfolio/portfolio.json"]

[dev]
  command = "npm run vite"
  targetPort = 5173
  port = 8888
  publish = "dist"

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/content"
  status = 200

[[redirects]]
  from = "/api/inquiries"
  to = "/.netlify/functions/inquiries"
  status = 200

[[redirects]]
  from = "/api/upload-media"
  to = "/.netlify/functions/upload-media"
  status = 200

[[redirects]]
  from = "/api/media/*"
  to = "/.netlify/functions/media?key=:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
